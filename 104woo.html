<meta charset="utf-8">
<title>法拍女王_陳慧瑜_法拍物件總覽</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
  --bg:#F5F5F1; --surface:#FFFFFF; --ink:#22303A; --muted:#67717B;
  --line:#E1E3DE; --accent:#2F5578; --accent-ink:#FFFFFF; --brand:#004AAD;
  --good:#2E7D4F; --good-bg:#E7F2EB; --bad:#B3352C; --bad-bg:#F8ECEA;
  --warn:#8F6A1D; --warn-bg:#F6EFDD; --dim:#8A939C; --dim-bg:#EEEFEC;
  --chip:#EDF1F5; --line-green:#06C755; --shadow:0 1px 3px rgba(34,48,58,.08);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#14181D; --surface:#1C232B; --ink:#E8EAED; --muted:#9AA4AE;
    --line:#2A333D; --accent:#8FB4DC; --accent-ink:#14181D; --brand:#0F53B8;
    --good:#63B98C; --good-bg:#1E3328; --bad:#E27A72; --bad-bg:#3A2320;
    --warn:#D9A441; --warn-bg:#372E1B; --dim:#7C868F; --dim-bg:#232A32;
    --chip:#242D36; --line-green:#2EBD5F; --shadow:0 1px 3px rgba(0,0,0,.35);
  }
}
:root[data-theme="dark"]{
  --bg:#14181D; --surface:#1C232B; --ink:#E8EAED; --muted:#9AA4AE;
  --line:#2A333D; --accent:#8FB4DC; --accent-ink:#14181D; --brand:#0F53B8;
  --good:#63B98C; --good-bg:#1E3328; --bad:#E27A72; --bad-bg:#3A2320;
  --warn:#D9A441; --warn-bg:#372E1B; --dim:#7C868F; --dim-bg:#232A32;
  --chip:#242D36; --line-green:#2EBD5F; --shadow:0 1px 3px rgba(0,0,0,.35);
}
:root[data-theme="light"]{
  --bg:#F5F5F1; --surface:#FFFFFF; --ink:#22303A; --muted:#67717B;
  --line:#E1E3DE; --accent:#2F5578; --accent-ink:#FFFFFF; --brand:#004AAD;
  --good:#2E7D4F; --good-bg:#E7F2EB; --bad:#B3352C; --bad-bg:#F8ECEA;
  --warn:#8F6A1D; --warn-bg:#F6EFDD; --dim:#8A939C; --dim-bg:#EEEFEC;
  --chip:#EDF1F5; --line-green:#06C755; --shadow:0 1px 3px rgba(34,48,58,.08);
}
*{box-sizing:border-box}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  font-size:15px; line-height:1.6;
}
.wrap{max-width:1180px; margin:0 auto; padding:0 20px 64px}
header.site{padding:24px 0 16px; border-bottom:2px solid var(--ink)}
.topbar{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap}
.eyebrow{font-size:12px; letter-spacing:.35em; color:var(--brand); font-weight:700}
h1{
  margin:.25rem 0 .4rem; font-size:clamp(22px,4.2vw,34px); line-height:1.3;
  font-family:"Noto Serif TC","Songti TC",PMingLiU,serif; font-weight:700; text-wrap:balance;
}
.src{font-size:13px; color:var(--muted)}
nav.views{display:flex; gap:8px; margin-top:6px}
nav.views a{
  text-decoration:none; font-size:13px; font-weight:700; padding:7px 16px;
  border-radius:999px; border:1px solid var(--brand); color:var(--brand);
}
:root[data-theme="dark"] nav.views a, .dark nav.views a{border-color:var(--accent); color:var(--accent)}
nav.views a.active{background:var(--brand); color:#fff}
/* ===== 品牌 Hero（顧客首頁） ===== */
.brand-hero{
  margin:20px 0 4px; border-radius:10px; overflow:hidden; box-shadow:var(--shadow);
  background:var(--brand); color:#fff; display:flex; align-items:center; gap:18px;
  padding:20px 26px; flex-wrap:wrap;
}
.brand-hero img{width:104px; height:auto}
.brand-hero .t1{font-size:20px; font-weight:800; line-height:1.4}
.brand-hero .t2{font-size:13.5px; opacity:.92; margin-top:2px}
.brand-hero .cta{margin-left:auto; display:flex; gap:8px; flex-wrap:wrap}
.brand-hero .cta a{
  text-decoration:none; font-size:13px; font-weight:700; padding:9px 16px; border-radius:6px;
  background:#fff; color:var(--brand);
}
.brand-hero .cta a.line{background:var(--line-green); color:#fff}
.stats{display:flex; flex-wrap:wrap; gap:12px; margin:18px 0 4px}
.stat{
  background:var(--surface); border:1px solid var(--line); border-radius:6px;
  padding:8px 16px; box-shadow:var(--shadow); min-width:104px;
}
.stat b{display:block; font-size:21px; font-variant-numeric:tabular-nums; line-height:1.2}
.stat span{font-size:12px; color:var(--muted)}
.stat.hot b{color:var(--bad)}
.toolbar{
  position:sticky; top:0; z-index:10; background:var(--bg);
  padding:14px 0 12px; border-bottom:1px solid var(--line); margin-bottom:20px;
}
.controls{display:flex; flex-wrap:wrap; gap:8px; align-items:center}
.controls input[type=text], .controls input[type=number], .controls select,
.admin-bar input[type=text], .admin-bar select{
  background:var(--surface); color:var(--ink); border:1px solid var(--line);
  border-radius:6px; padding:8px 10px; font-size:14px; font-family:inherit;
}
.controls input[type=text]{flex:1 1 200px; min-width:160px}
.controls input[type=number]{width:92px}
.controls select{max-width:150px}
input:focus, select:focus, textarea:focus, button:focus-visible, a:focus-visible{
  outline:2px solid var(--accent); outline-offset:1px;
}
.controls .price-group{display:flex; align-items:center; gap:4px; font-size:13px; color:var(--muted)}
button.reset{
  background:none; border:1px solid var(--line); color:var(--muted); border-radius:6px;
  padding:8px 12px; font-size:13px; cursor:pointer; font-family:inherit;
}
button.reset:hover{color:var(--ink); border-color:var(--muted)}
.count{font-size:13px; color:var(--muted); margin-top:8px}
.count b{color:var(--accent); font-variant-numeric:tabular-nums}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:16px}
.card{
  background:var(--surface); border:1px solid var(--line); border-radius:8px;
  box-shadow:var(--shadow); display:flex; flex-direction:column; gap:10px;
  cursor:pointer; overflow:hidden;
}
.card .photo{height:170px; background:linear-gradient(135deg,var(--chip),var(--dim-bg));
  display:flex; align-items:center; justify-content:center; color:var(--dim); font-size:34px}
.card .photo img{width:100%; height:100%; object-fit:cover; display:block}
.card .body{padding:12px 16px 16px; display:flex; flex-direction:column; gap:10px; flex:1}
.tags{display:flex; flex-wrap:wrap; gap:6px; align-items:center}
.chip{font-size:12px; padding:2px 9px; border-radius:999px; background:var(--chip); color:var(--ink); white-space:nowrap}
.chip.loc{background:var(--accent); color:var(--accent-ink); font-weight:600}
.pill{font-size:12px; padding:2px 9px; border-radius:999px; font-weight:600; white-space:nowrap}
.pill.good{background:var(--good-bg); color:var(--good)}
.pill.bad{background:var(--bad-bg); color:var(--bad)}
.pill.warn{background:var(--warn-bg); color:var(--warn)}
.pill.dim{background:var(--dim-bg); color:var(--dim)}
.addr{font-size:16px; font-weight:700; line-height:1.45}
.comm{font-size:13px; color:var(--muted)}
.price-row{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap}
.price{font-size:26px; font-weight:800; color:var(--accent); font-variant-numeric:tabular-nums; line-height:1.1}
.price small{font-size:14px; font-weight:600}
.unit{font-size:13px; color:var(--muted); font-variant-numeric:tabular-nums}
.specs{
  display:flex; flex-wrap:wrap; gap:4px 14px; font-size:13px; color:var(--muted);
  font-variant-numeric:tabular-nums; border-top:1px dashed var(--line); padding-top:8px;
}
.specs b{color:var(--ink); font-weight:600}
.auction-row{display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:13px}
.dday{font-size:12px; padding:2px 9px; border-radius:999px; font-weight:700; font-variant-numeric:tabular-nums}
.dday.past{background:var(--dim-bg); color:var(--dim)}
.dday.soon{background:var(--bad-bg); color:var(--bad)}
.dday.near{background:var(--warn-bg); color:var(--warn)}
.dday.later{background:var(--chip); color:var(--muted)}
.enter{margin-top:auto; padding-top:4px; text-align:right; font-size:13px; font-weight:700; color:var(--accent)}
.empty{text-align:center; color:var(--muted); padding:60px 0; font-size:15px}
footer.site{
  margin-top:48px; border-top:1px solid var(--line); padding-top:20px;
  font-size:12.5px; color:var(--muted); line-height:1.8;
}
/* ===== 管理版 ===== */
.admin-bar{display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:12px}
.admin-bar input[type=text]{flex:1 1 220px}
button.btn{
  border:1px solid var(--accent); background:var(--accent); color:var(--accent-ink);
  border-radius:6px; padding:8px 14px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit;
}
button.btn.ghost{background:none; color:var(--accent)}
button.btn.small{padding:3px 10px; font-size:12px}
button.btn.danger{background:var(--bad); border-color:var(--bad); color:#fff}
.table-wrap{overflow-x:auto; background:var(--surface); border:1px solid var(--line); border-radius:8px; box-shadow:var(--shadow)}
table.admin{border-collapse:collapse; width:100%; min-width:960px; font-size:13px}
table.admin th, table.admin td{padding:7px 9px; text-align:left; border-bottom:1px solid var(--line); white-space:nowrap}
table.admin td.addr-cell{white-space:normal; min-width:170px}
table.admin th{
  position:sticky; top:0; background:var(--accent); color:var(--accent-ink);
  cursor:pointer; user-select:none; font-weight:700;
}
table.admin th .arr{font-size:11px; opacity:.85}
table.admin tbody tr{cursor:pointer}
table.admin tbody tr:hover{background:var(--chip)}
table.admin td{font-variant-numeric:tabular-nums}
table.admin tr.delisted td{color:var(--dim)}
/* ===== 詳細頁 ===== */
.back{display:inline-block; margin:18px 0 4px; font-size:14px; font-weight:700; color:var(--accent); text-decoration:none}
.notice-delist{
  background:var(--bad-bg); color:var(--bad); border:1px solid var(--bad);
  border-radius:8px; padding:14px 18px; font-weight:700; margin:14px 0; font-size:15px;
}
.hero{border-radius:10px; overflow:hidden; box-shadow:var(--shadow); margin:14px 0 4px}
.hero .bar{background:var(--brand); color:#fff; font-size:clamp(18px,3.4vw,26px); font-weight:800;
  letter-spacing:.1em; text-align:center; padding:10px 12px}
.hero .bar.bottom{
  padding:14px 12px; font-size:clamp(22px,4.5vw,36px); letter-spacing:.06em;
  line-height:1.3; font-variant-numeric:tabular-nums;
}
.hero-cta{display:flex; gap:12px; justify-content:center; flex-wrap:wrap;
  background:var(--brand); padding:0 12px 16px}
.hero-cta a{
  text-decoration:none; font-size:clamp(16px,2.6vw,20px); font-weight:800;
  padding:12px 26px; border-radius:8px; background:#fff; color:var(--brand);
}
.hero-cta a.line{background:var(--line-green); color:#fff}
.item-nav{display:flex; justify-content:space-between; gap:8px; margin:12px 0 0}
.item-nav a{
  text-decoration:none; font-size:14px; font-weight:700; padding:9px 18px;
  border-radius:6px; border:1px solid var(--accent); color:var(--accent); background:var(--surface);
}
.item-nav a.off{opacity:.35; pointer-events:none}
.mapcap{position:absolute; top:26px; left:26px; background:rgba(0,74,173,.9); color:#fff;
  font-size:12px; padding:3px 10px; border-radius:999px}
.hero .mid{background:#fff; position:relative; padding:0; display:flex;
  justify-content:center; align-items:flex-end}
.hero .mid img.prop{width:100%; max-height:540px; object-fit:cover; display:block}
.hero .mid img.queen{position:absolute; left:12px; bottom:0; width:clamp(84px,14vw,150px); height:auto;
  filter:drop-shadow(2px 0 4px rgba(0,0,0,.25))}
.hero .mid .noimg{
  display:flex; flex-direction:column; align-items:center; gap:10px; padding:34px 0 46px; color:#67717B;
}
.hero .mid .noimg a{
  text-decoration:none; font-weight:700; color:#fff; background:var(--brand);
  padding:10px 20px; border-radius:6px; font-size:14px;
}
.detail-head{margin:12px 0 4px}
.detail-head h2{
  margin:6px 0 4px; font-size:clamp(20px,4vw,28px); line-height:1.4;
  font-family:"Noto Serif TC","Songti TC",PMingLiU,serif; text-wrap:balance;
}
.voice-bar{display:flex; align-items:center; gap:10px; margin:10px 0 0; flex-wrap:wrap}
.voice-bar button{
  border:1px solid var(--brand); background:var(--brand); color:#fff; border-radius:999px;
  padding:8px 18px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
}
.voice-bar button.stop{background:none; color:var(--brand)}
.voice-bar .hint{font-size:12px; color:var(--muted)}
.detail-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px}
.panel{
  background:var(--surface); border:1px solid var(--line); border-radius:8px;
  box-shadow:var(--shadow); padding:18px 20px;
}
.panel.full{grid-column:1 / -1}
.panel h3{margin:0 0 10px; font-size:16px; padding-bottom:8px; border-bottom:2px solid var(--accent)}
.kv{display:grid; grid-template-columns:max-content 1fr; gap:7px 16px; font-size:14px}
.kv dt{color:var(--muted); white-space:nowrap}
.kv dd{margin:0; font-variant-numeric:tabular-nums}
.kv dd b.big{font-size:20px; color:var(--accent)}
.kv dd .sub{font-size:12.5px; color:var(--muted)}
.panel .foot{font-size:11.5px; color:var(--dim); margin-top:10px}
.detail-actions{display:flex; gap:8px; flex-wrap:wrap; margin-top:14px}
.detail-actions a{
  text-decoration:none; font-size:14px; font-weight:700; padding:9px 18px;
  border-radius:6px; border:1px solid var(--accent); color:var(--accent);
}
.detail-actions a.primary{background:var(--accent); color:var(--accent-ink)}
.detail-actions a.line{background:var(--line-green); border-color:var(--line-green); color:#fff}
pre.bld{
  white-space:pre-wrap; font-family:inherit; color:var(--muted); margin:0;
  background:var(--bg); border-radius:6px; padding:12px 14px; font-size:13px; line-height:1.7;
}
ol.notes{margin:0; padding-left:1.4em; font-size:14px}
ol.notes li{margin-bottom:8px}
ol.notes b{color:var(--bad)}
.contact-name{font-size:17px; font-weight:800}
/* ===== 管理表單 Modal ===== */
.modal-mask{position:fixed; inset:0; background:rgba(10,16,22,.55); z-index:50;
  display:flex; align-items:flex-start; justify-content:center; padding:30px 14px; overflow:auto}
.modal{background:var(--surface); color:var(--ink); border-radius:10px; box-shadow:0 10px 40px rgba(0,0,0,.3);
  width:min(760px,100%); padding:22px 24px}
.modal h3{margin:0 0 14px; font-size:18px}
.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px 14px}
.form-grid label{display:flex; flex-direction:column; gap:3px; font-size:12.5px; color:var(--muted)}
.form-grid label.full{grid-column:1 / -1}
.form-grid input, .form-grid select, .form-grid textarea{
  background:var(--bg); color:var(--ink); border:1px solid var(--line); border-radius:6px;
  padding:8px 10px; font-size:14px; font-family:inherit;
}
.form-grid textarea{resize:vertical; min-height:56px}
.modal .acts{display:flex; justify-content:flex-end; gap:8px; margin-top:16px}
@media (max-width:760px){
  .detail-grid{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .brand-hero .cta{margin-left:0}
}
@media (max-width:640px){
  .toolbar{position:static}
  .grid{grid-template-columns:1fr}
  .controls select{flex:1 1 46%; max-width:none}
  .stat{flex:1 1 40%}
}
@media (prefers-reduced-motion: no-preference){
  .card{transition:transform .15s ease, box-shadow .15s ease}
  .card:hover{transform:translateY(-2px); box-shadow:0 4px 12px rgba(34,48,58,.12)}
}
</style>

/* ===== 語音講解（Web Speech API，台灣中文） ===== */
function numZh(n){
  if(n == null || isNaN(n)) return '';
  n = Number(n);
  const digits = '零一二三四五六七八九';
  const intPart = Math.floor(Math.abs(n));
  const decPart = Math.round((Math.abs(n) - intPart) * 10) / 10;
  function below10000(x){
    if(x === 0) return '零';
    const units = ['','十','百','千'];
    let s = '', str = String(x);
    for(let idx = 0; idx < str.length; idx++){
      const d = +str[idx], pos = str.length - 1 - idx;
      if(d === 0){ if(!s.endsWith('零') && s) s += '零'; }
      else s += digits[d] + units[pos];
    }
    s = s.replace(/零+$/, '');
    if(x >= 10 && x < 20 && s.startsWith('一十')) s = s.slice(1);
    return s;
  }
  let s = '';
  if(intPart >= 10000){
    s = below10000(Math.floor(intPart/10000)) + '萬';
    const rest = intPart % 10000;
    if(rest) s += (rest < 1000 ? '零' : '') + below10000(rest);
  } else s = below10000(intPart);
  const dec = Math.round((decPart % 1) * 10);
  if(dec) s += '點' + digits[dec];
  return s;
}
function narrText(i){
  const d = i.dateISO ? new Date(i.dateISO + 'T00:00:00') : null;
  const dateZh = d ? `${numZh(d.getMonth()+1)}月${numZh(d.getDate())}日` : '';
  const dep = deposit(i.price);
  let s = '哈囉大家好，我是法拍女王陳慧瑜！今天為您介紹：' + name(i) + '。' + (i.feat || '');
  if(i.school && !i.school.includes('無學校')) s += i.school.replace('1 公里內','一公里內').replace('500 公尺內','五百公尺內');
  if(dateZh) s += `拍賣重點：${dateZh}開標，目前${i.auc || ''}，`;
  if(i.price != null && i.price !== '') s += `底價${numZh(i.price)}萬元，`;
  if(dep != null) s += `投標保證金約${numZh(dep)}萬元，`;
  s += `點交狀態：${i.hand || '詳見法院公告'}。`;
  s += '歡迎來電洽詢，未得標免付費。法拍找慧瑜，你的問題，我的專業！';
  return s;
}
let speaking = false;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  return vs.find(v=>/zh[-_]TW/i.test(v.lang)) || vs.find(v=>/^zh/i.test(v.lang)) || null;
}
function speak(text){
  stopSpeak();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-TW'; u.rate = 1.0;
  const v = pickVoice();
  if(v) u.voice = v;
  u.onend = u.onerror = ()=>{ speaking = false; updateVoiceBtn(); };
  speaking = true;
  speechSynthesis.speak(u);
  updateVoiceBtn();
}
function stopSpeak(){
  if(window.speechSynthesis){ speechSynthesis.cancel(); }
  speaking = false; updateVoiceBtn();
}
function updateVoiceBtn(){
  const b = $('voicePlay');
  if(b) b.textContent = speaking ? '🔊 講解中…（再按重播）' : '🔊 語音講解';
}

function filterSort(list, s){
  const q = (s.q||'').trim().toLowerCase();
  const pMin = parseFloat(s.pMin), pMax = parseFloat(s.pMax);
  let out = list.filter(i=>{
    if(s.city && i.city !== s.city) return false;
    if(s.dist && i.dist !== s.dist) return false;
    if(s.type && i.type !== s.type) return false;
    if(s.auc && i.auc !== s.auc) return false;
    if(s.hand && i.hand !== s.hand) return false;
    if(!isNaN(pMin) && (i.price == null || i.price < pMin)) return false;
    if(!isNaN(pMax) && (i.price == null || i.price > pMax)) return false;
    if(q){
      const hay = `${i.addr ?? ''} ${i.comm ?? ''} ${i.case ?? ''} ${i.dist ?? ''} ${i.name ?? ''}`.toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  const nul = v => (v == null || v === '') ? Infinity : Number(v);
  if(s.sort === 'default')   out = defaultSort(out);
  if(s.sort === 'date')      out.sort((x,y)=>(x.dateISO ?? '9999').localeCompare(y.dateISO ?? '9999'));
  if(s.sort === 'priceAsc')  out.sort((x,y)=>nul(x.price) - nul(y.price));
  if(s.sort === 'priceDesc') out.sort((x,y)=>(Number(y.price) || -1) - (Number(x.price) || -1));
  if(s.sort === 'unitAsc')   out.sort((x,y)=>nul(x.unit) - nul(y.unit));
  if(s.sort === 'bldDesc')   out.sort((x,y)=>(Number(y.bld) || -1) - (Number(x.bld) || -1));
  return out;
}

    $(id).addEventListener('input', ()=>{ admState[key] = $(id).value; renderTable(); });
    $(id).addEventListener('change', ()=>{ admState[key] = $(id).value; renderTable(); });
  };
  bind('aq','q'); bind('aDist','dist'); bind('aType','type'); bind('aAuc','auc'); bind('aHand','hand');
  bind('aPMin','pMin'); bind('aPMax','pMax');
  $('aCity').addEventListener('change', ()=>{ admState.city = $('aCity').value; admState.dist = ''; adminView(); });
  $('aReset').addEventListener('click', ()=>{
    Object.assign(admState, {q:'', city:'', dist:'', type:'', auc:'', hand:'', pMin:'', pMax:''});
    adminView();
  });
  $('addBtn').addEventListener('click', ()=>openForm(null));
  $('offBtn').addEventListener('click', ()=>{ location.hash = '#/admin/off'; });
  $('exportBtn').addEventListener('click', exportData);
  document.querySelectorAll('#aTable th').forEach(th=>{
    if(th.dataset.key === '_act' || th.dataset.key === '_url') return;
    th.addEventListener('click', ()=>{
      const k = th.dataset.key;
      if(admState.sortKey === k) admState.sortDir *= -1;
      else { admState.sortKey = k; admState.sortDir = 1; }
      renderTable();
    });
  });
  renderTable();
}
function renderTable(){
  const list = admFiltered().filter(i=>!isDelisted(i));
  const k = admState.sortKey, dir = admState.sortDir;
  document.querySelectorAll('#aTable th').forEach(th=>{
    const arr = th.querySelector('.arr');
    if(arr) arr.textContent = th.dataset.key===k ? (dir===1?'▲':'▼') : '';
  });
  document.querySelector('#aTable tbody').innerHTML = list.map(rowHtml).join('') ||
    `<tr><td colspan="${ADM_COLS.length}" style="color:var(--dim)">沒有符合條件的物件。</td></tr>`;
  $('aCount').innerHTML = `符合 <b>${list.length}</b> 件／已下架 ${DATA.filter(isDelisted).length} 件（全部 ${DATA.length} 件）`;
  attachRows();
}

function openForm(id){
  const i = id != null ? DATA.find(x=>x.id===id) : {};
  const mask = document.createElement('div');
  mask.className = 'modal-mask';
  mask.innerHTML = `<div class="modal" role="dialog" aria-modal="true">
    <h3>${id != null ? '編輯物件 #' + id : '手動上架新物件'}</h3>
    <div class="form-grid">
      ${FORM_FIELDS.map(([k,label,kind,extra])=>{
        const full = extra === 'full' ? ' class="full"' : '';
        const val = esc(i[k] ?? '');
        if(kind === 'select'){
          const list = Array.isArray(extra) ? extra : [];
          return `<label${full}>${label}<select data-f="${k}">${list.map(o=>`<option${o===i[k]?' selected':''}>${o}</option>`).join('')}</select></label>`;
        }
        if(kind === 'textarea') return `<label${full}>${label}<textarea data-f="${k}">${val}</textarea></label>`;
        return `<label${full}>${label}<input type="${kind}" data-f="${k}" value="${val}"></label>`;
      }).join('')}
    </div>
    <div class="acts">
      <button class="btn ghost" id="fCancel">取消</button>
      <button class="btn" id="fSave">儲存${id == null ? '並上架' : ''}</button>
    </div>
  </div>`;
  document.body.appendChild(mask);
  mask.addEventListener('click', e=>{ if(e.target === mask) mask.remove(); });
  mask.querySelector('#fCancel').addEventListener('click', ()=>mask.remove());
  mask.querySelector('#fSave').addEventListener('click', ()=>{
    const vals = {};
    mask.querySelectorAll('[data-f]').forEach(el=>{
      let v = el.value.trim();
      if(el.type === 'number' && v !== '') v = Number(v);
      vals[el.dataset.f] = v === '' ? null : v;
    });
    if(!vals.addr){ alert('請至少填寫門牌地址'); return; }
    if(vals.dateISO){
      const d = new Date(vals.dateISO + 'T00:00:00');
      vals.date = `${d.getFullYear()-1911}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
    }
    if(id != null){
      const edits = lsGet(LS_EDIT, {});
      edits[id] = Object.assign(edits[id] || {}, vals);
      lsSet(LS_EDIT, edits);
    } else {
      const added = lsGet(LS_ADD, []);
      vals.id = 100000 + added.length + 1;
      vals.manual = true;
      added.push(vals);
      lsSet(LS_ADD, added);
    }
    rebuild();
    mask.remove();
    route();
  });
}

/* ===================== 管理版密碼閘 ===================== */
const ADMIN_HASH = 'b0cc4591ccf26a36ef761c0817062b9a3937d5c9ccb82247d11bd899c1ed2c37';
async function verifyAdminPw(pw){
  try{
    if(window.crypto && crypto.subtle){
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
      const hex = [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
      return hex === ADMIN_HASH;
    }
  }catch(e){}
  return btoa(pw) === 'MjUzMTI1MzE=';   // 非安全環境（file://）備援
}

/* ===================== 路由 ===================== */
let lastList = 'cust';
function route(){
  stopSpeak();
  const h = location.hash || '#/';
  const mItem = h.match(/^#\/item\/(\d+)$/);
  $('navCust').classList.toggle('active', !h.startsWith('#/admin') && !mItem);
  $('navAdmin').classList.toggle('active', h.startsWith('#/admin'));
  if(mItem){ detailView(parseInt(mItem[1], 10)); }
  else if(h.startsWith('#/admin')){
    lastList = 'admin';
    if(sessionStorage.getItem('qa_admin_ok') === '1'){
      if(h === '#/admin/off') delistedView(); else adminView();
    } else adminGateView();
  }
  else { lastList = 'cust'; custView(); }
}
window.addEventListener('hashchange', route);
